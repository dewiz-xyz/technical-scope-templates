      - "pre-deployed contracts"
      - "recommended spell instructions"
      - "proposed spell content"
      - "add new starguard module"
    required_forum_tags:
      - "technical-scope"
    required_sections:
      - "Technical scope of the launch"
      - "Relevant audits"
      - "Pre-deployed contracts"
      - "New deployments"
      - "Recommended spell instructions"

