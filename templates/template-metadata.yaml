version: 1
templates:
  - template_id: "allocator-instance-launch"
    path: "templates/allocator-instance-launch.md"
    human_template_style: "forum-post"
    best_example_title: "Technical scope of the new PATTERN allocator instance"
    best_example_url: "https://forum.skyeco.com/t/technical-scope-of-the-new-pattern-allocator-instance/27641"
    match_title_regex: "(?i)(allocator instance|allocator launch|new .* allocator instance|allocator adjustment|allocator .* setup|allocator .* offboard|executor agent|new .* agent|core council executor agent)"
    match_heading_keywords:
      - "relevant audits"
      - "audits"
      - "pre-deployed contracts"
      - "new subproxy"
      - "new starguard"
      - "proposed spell content"
      - "offboard operator"
      - "setup subproxy"
    required_forum_tags:
      - "technical-scope"
    required_sections:
      - "Relevant audits"
      - "Pre-deployed contracts"
      - "Proposed spell content"

  - template_id: "starguard-rollout"
